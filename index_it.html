    <script type="text/javascript" src="./js/timedimension_map_milano.js"></script>
<script>

      // ---- Normalisers (robust matching across dataset quirks) ----
      // Some entries may contain trailing spaces or multiple inner spaces.
      // We normalise to compare reliably (case-insensitive, trimmed, collapsed whitespace).
      function normSiteName(v) {
        return (v == null ? "" : String(v))
          .replace(/\s+/g, " " )
          .trim()
          .toLowerCase();
      }

      function cleanYearValue(v) {
        var s = String(v == null ? '' : v).trim();
        if (!s) return '';
        var lower = s.toLowerCase();
        if (lower === 'null' || lower === 'nan') return '';
        return s;
      }

      function numericYearValue(v, fallback) {
        var s = cleanYearValue(v);
        if (!s) return (typeof fallback === 'number') ? fallback : null;
        var n = Number(s);
        return isNaN(n) ? ((typeof fallback === 'number') ? fallback : null) : n;
      }

      function currentTimelineYear() {
        return new Date().getFullYear();
      }

      // ---- Derive slider interval from data (fallback to 1927–2026) ----
      function getYearRange(arr) {
        var minY = 9999, maxY = 0;
        for (var i = 0; i < arr.length; i++) {
          var s = numericYearValue(arr[i].start_year);
          var e = numericYearValue(arr[i].end_year, currentTimelineYear());
          if (!isNaN(s)) minY = Math.min(minY, s);
          if (!isNaN(e)) maxY = Math.max(maxY, e);
        }
        if (minY === 9999) minY = 1927;
        if (maxY === 0) maxY = 2026;
        return { min: minY, max: maxY };
      }

      var yr = getYearRange(milanoSites);
      var startISO = yr.min + "-01-01";
      var endISO = yr.max + "-12-31";

      var map = createAndSetUpMapMilano(startISO, endISO);

      function getSidebarOcclusionInsets() {
        var out = { top: 0, right: 0, bottom: 0, left: 0 };
        var sidebar = document.getElementById('sidebar');
        if (!sidebar || !map || !map.getContainer) return out;
        try {
          var mapRect = map.getContainer().getBoundingClientRect();
          var sideRect = sidebar.getBoundingClientRect();
          if (!mapRect || !sideRect) return out;

          var overlapX = Math.min(mapRect.right, sideRect.right) - Math.max(mapRect.left, sideRect.left);
          var overlapY = Math.min(mapRect.bottom, sideRect.bottom) - Math.max(mapRect.top, sideRect.top);
          if (overlapX <= 0 || overlapY <= 0) return out;

          if (sideRect.width >= mapRect.width * 0.75) {
            out.bottom = Math.round(overlapY);
            return out;
          }

          out.right = Math.round(overlapX);
        } catch (e) {}
        return out;
      }

      function getVisibleMapSize() {
        if (!map || !map.getSize) return null;
        var size = map.getSize();
        var insets = getSidebarOcclusionInsets();
        return L.point(
          Math.max(160, size.x - insets.left - insets.right),
          Math.max(160, size.y - insets.top - insets.bottom)
        );
      }

      function fitBoundsKeepingSidebar(bounds, extraOptions) {
        if (!map || !bounds || !bounds.isValid || !bounds.isValid()) return;
        var insets = getSidebarOcclusionInsets();
        var opts = {
          maxZoom: 13,
          paddingTopLeft: [24 + insets.left, 24 + insets.top],
          paddingBottomRight: [24 + insets.right, 32 + insets.bottom]
        };
        if (extraOptions) {
          for (var k in extraOptions) opts[k] = extraOptions[k];
        }
        map.fitBounds(bounds, opts);
      }

      function focusLatLngKeepingSidebar(latlng, zoom) {
        if (!map || !latlng) return;
        map.setView(latlng, zoom);
        var insets = getSidebarOcclusionInsets();
        var dx = Math.round((insets.right - insets.left) / 2);
        var dy = Math.round((insets.bottom - insets.top) / 2);
        if (dx || dy) {
          try { map.panBy([dx, dy], { animate: false }); } catch (e) {}
        }
      }

      // ---- Build points GeoJSON ----
      var sitesGeojson = buildPointsForSites(milanoSites);

      // ---- Initial framing: keep the view centred on Milano and include all points ----
      // The right sidebar occupies part of the map, so we compensate with right padding
      // and a slightly tighter bound to keep the city more centred without hiding outer points.
      try {
        var bb = L.latLngBounds([]);
        (sitesGeojson.features || []).forEach(function(f){
          var g = f && f.geometry;
          if (!g || g.type !== 'Point' || !Array.isArray(g.coordinates)) return;
          var lng = Number(g.coordinates[0]);
          var lat = Number(g.coordinates[1]);
          if (isNaN(lat) || isNaN(lng)) return;
          bb.extend([lat, lng]);
        });
        if (bb && bb.isValid && bb.isValid()) {
          setTimeout(function(){
            try { fitBoundsKeepingSidebar(bb.pad(0.06)); } catch(e) {}
          }, 0);
        }
      } catch(e) {}

      // ---- Category list (used to build the checkbox filter UI) ----
      // We collect distinct categories from the dataset and keep the original labels for display.
      function getCategories(arr) {
        var seen = {};
        for (var i = 0; i < arr.length; i++) {
          var c = (arr[i].categoria || '').toString().trim();
          if (c) seen[c.toLowerCase()] = c;
        }
        var out = Object.keys(seen).map(function(k){ return seen[k]; });
        out.sort(function(a,b){ return a.localeCompare(b, 'it'); });
        return out;
      }

      

// ---- Affiliation list (Comunità) ----
var AFF_NONE_KEY = '(none)';
var AFFILIATION_ORDER = ['chabad', 'lebanese', 'milanese', 'persian', 'mena', 'postwar', AFF_NONE_KEY];

function noneAffiliationLabel() {
  return '(nessuna)';
}

function canonicalAffiliationKey(value) {
  var raw = String(value == null ? '' : value).trim().toLowerCase();
  if (!raw || raw === '(nessuna)' || raw === '(none)') return AFF_NONE_KEY;
  if (raw === 'chabad') return 'chabad';
  if (raw.indexOf('libanese') >= 0 || raw.indexOf('lebanese') >= 0) return 'lebanese';
  if (raw.indexOf('milanese') >= 0 || raw.indexOf('milanes') >= 0) return 'milanese';
  if (raw.indexOf('persian') >= 0 || raw.indexOf('persiana') >= 0) return 'persian';
  if (raw.indexOf('medio oriente') >= 0 || raw.indexOf('middle eastern') >= 0 || raw.indexOf('north african') >= 0) return 'mena';
  if (raw.indexOf('dopoguerra') >= 0 || raw.indexOf('postwar') >= 0) return 'postwar';
  return raw;
}

function compareAffiliationKeys(a, b) {
  var ia = AFFILIATION_ORDER.indexOf(a);
  var ib = AFFILIATION_ORDER.indexOf(b);
  if (ia === -1 && ib === -1) return String(a).localeCompare(String(b), 'it');
  if (ia === -1) return 1;
  if (ib === -1) return -1;
  return ia - ib;
}

function getAffiliations(arr) {
  var seen = {};
  var hasNone = false;
  for (var i = 0; i < arr.length; i++) {
    var a = (arr[i].affiliazione || '').toString().trim();
    if (!a) {
      hasNone = true;
      continue;
    }
    var key = canonicalAffiliationKey(a);
    if (!seen[key]) seen[key] = a;
  }
  var keys = Object.keys(seen).sort(compareAffiliationKeys);
  var labels = keys.map(function(k){ return seen[k]; });
  if (hasNone) {
    keys.push(AFF_NONE_KEY);
    labels.push(noneAffiliationLabel());
  }
  return { labels: labels, keys: keys };
}

var categories = getCategories(milanoSites);


var affiliationMeta = getAffiliations(milanoSites);
var affiliations = affiliationMeta.labels;

var affiliationsLowerAll = affiliationMeta.keys;
// NOTE: Comunità is used for HIGHLIGHTING ONLY (marker outlines).
// It must not filter which points are shown.
var activeAffiliationsLower = affiliationsLowerAll.slice(); // kept for backward compatibility (always = all)

// Comunità selection state (multi-select highlight)
// Empty = no highlight (no outlines)
var selectedAffiliationsLower = [];

// Deterministic outline colours for communities (used as marker borders)
var AFF_OUTLINE_COLORS = (function(){
  var fixed = {
    '(none)': '#8e8e8e',
    'chabad': '#06B6D4',
    'lebanese': '#9333EA',
    'milanese': '#16A34A',
    'persian': '#1E3A8A',
    'mena': '#EC4899',
    'postwar': '#7F1D1D'
  };
  var coolFallback = ['#06B6D4','#9333EA','#16A34A','#1E3A8A','#EC4899','#7F1D1D','#5d6d7e','#5bc0be'];
  var m = {};
  for (var i=0;i<affiliationsLowerAll.length;i++){
    var k = affiliationsLowerAll[i];
    m[k] = fixed[k] || coolFallback[i % coolFallback.length];
  }
  if (!m[AFF_NONE_KEY]) m[AFF_NONE_KEY] = '#8e8e8e';
  return m;
})();


      var categoriesLowerAll = categories.map(function(x){ return (x || '').toString().trim().toLowerCase(); });
      var activeCategoriesLower = categoriesLowerAll.slice(); // start with all selected

      // Category colours (used by the point style and by the checkbox 'swatches').
      // Keys are normalised to lower-case so matching is robust.
      // If your dataset uses different labels, add aliases here (e.g., 'associazioni' -> same blue).
      var CATEGORY_COLORS = {
        "religioso": "#f17e5a",
        "religious institution": "#f17e5a",
        "istituzione religiosa": "#f17e5a",
        "educazione": "#f17e5a",
        "school": "#f17e5a",
        "scuola": "#f17e5a",
        "associazione": "#f17e5a",
        "association": "#f17e5a",
        "associazioni": "#f17e5a",
        "comunitario": "#f17e5a",
        "assistenza": "#f17e5a",
        "welfare institution": "#f17e5a",
        "organizzazione assistenziale": "#f17e5a",
        "altro": "#f17e5a",
        "other": "#f17e5a",
        "altro / non classificato": "#f17e5a",
        "non classificato": "#f17e5a"
      };

      
      function getPopupSourceInfo(p) {
        if (!p) return '';
        var direct = p.fonti || p.fonte || p.Fonti || p.sources || p.source || p.Sources || '';
        if (direct) return String(direct).trim();
        if (window.milanoSites && Array.isArray(window.milanoSites)) {
          var sito = String(p.sito || '').trim();
          var sy = String(p.start_year == null ? '' : p.start_year).trim();
          var ey = String(p.end_year == null ? '' : p.end_year).trim();
          for (var i = 0; i < window.milanoSites.length; i++) {
            var r = window.milanoSites[i] || {};
            if (String(r.sito || '').trim() !== sito) continue;
            var rsy = String(r.start_year == null ? '' : r.start_year).trim();
            var rey = String(r.end_year == null ? '' : r.end_year).trim();
            if ((sy && rsy && sy !== rsy) || (ey && rey && ey !== rey)) continue;
            var v = r.fonti || r.fonte || r.Fonti || r.sources || r.source || r.Sources || '';
            if (v) return String(v).trim();
          }
          for (var j = 0; j < window.milanoSites.length; j++) {
            var rr = window.milanoSites[j] || {};
            if (String(rr.sito || '').trim() !== sito) continue;
            var vv = rr.fonti || rr.fonte || rr.Fonti || rr.sources || rr.source || rr.Sources || '';
            if (vv) return String(vv).trim();
          }
        }
        return '';
      }

function bindPopupHtml(feature, layer) {
        var p = feature.properties || {};
        var yearsLabel = '';
        if ((p.end_year === null || p.end_year === undefined || p.end_year === '' || String(p.end_year).toLowerCase() === 'null') && p.start_year) {
          yearsLabel = String(p.start_year) + '–';
        } else if (p.start_year === p.end_year) {
          yearsLabel = String(p.start_year || '');
        } else {
          yearsLabel = String(p.start_year || '') + "–" + String(p.end_year || '');
        }

        var srcInfo = getPopupSourceInfo(p);
        var html = ''
          + '<div class="mini-popup">'
          + '<h2 class="mini-popup__title">' + (p.sito || '') + '</h2>'
          + '<div class="mini-popup__meta">'
          +   '<p class="mini-popup__line"><strong>Categoria:</strong> ' + (p.categoria || p.category || '') + '</p>'
          +   (p.affiliazione ? '<p class="mini-popup__line"><strong>Ente fondato da:</strong> ' + p.affiliazione + '</p>' : '')
          +   (p.indirizzo ? '<p class="mini-popup__line"><strong>Indirizzo:</strong> ' + p.indirizzo + '</p>' : '')
          +   '<p class="mini-popup__line"><strong>Attivo da:</strong> ' + yearsLabel + '</p>'
          +   (srcInfo ? '<p class="mini-popup__line mini-popup__line--source"><strong>Fonte:</strong> ' + srcInfo + '</p>' : '')
          + '</div>'
          + '</div>';

        // Default behaviour: opening a popup closes the previous one.
        // This keeps the map readable when moving across many phases.
        layer.bindPopup(html, {
          autoClose: true,
          closeOnClick: true,
          closeButton: true,
          keepInView: true,
          maxWidth: 280,
          minWidth: 210,
          className: 'leaflet-popup--mini'
        });

        layer.on('popupopen', function(){
          setTimeout(function(){
            try { applySmartPopupPlacement(layer); } catch(errp) {}
            try { updatePopupConnector(layer); } catch(errc) {}
            try { layoutStoryPhaseLabels(); } catch(errl) {}
          }, 0);
        });
        layer.on('popupclose', function(){
          setTimeout(function(){
            try { clearPopupConnector(layer); } catch(errc2) {}
            try { layoutStoryPhaseLabels(); } catch(errl2) {}
          }, 0);
        });
      }


      // Extra interactions:
      // - Clicking a marker in the general view isolates that place and shows its story (all phases).
      // - In story mode, each phase shows its date range as a permanent label above the marker.
      var selectedFocusUid = null;
      var selectedSiteLabel = null;

      function bindFeatureInteractions(feature, layer) {
        var p = (feature && feature.properties) ? feature.properties : {};
        var siteName = normSiteName(p.sito);

        // In story mode: we used to show date ranges as labels above markers,
        // but it made the map harder to read. Dates remain visible in popups and sidebar.

        // Click handling:
        // - In the GENERAL view, clicks are managed by updateOverlapStyles() so stacks can "spiderfy".
        // - In STORY mode (isolated place), we keep a simple click to open popup + update focus.
        if (selectedSiteName) {
          layer.on('click', function(e) {
            if (!p || !siteName) return;
            selectedFocusUid = String(p.uid || '');
            try { renderPlaceInfoForSelected(); } catch(err) {}
            try { layer.openPopup(); } catch(err2) {}
            try { if (e) L.DomEvent.stop(e); } catch(err3) {}
          });
        }
      }

      function onEachSiteFeature(feature, layer) {
        bindPopupHtml(feature, layer);
        bindFeatureInteractions(feature, layer);
        // Story mode: show phase dates near markers (helps read movements)
        if (selectedSiteName) {
          try { bindStoryPhaseLabel(feature, layer); } catch(e) {}
        }
      }

function buildLayers(selectedCategoriesLower, selectedAffiliationsLower) {
  // selectedCategoriesLower: array of lower-cased categories to show.
  // If null/undefined -> show all. If empty -> show none.
  var selected = Array.isArray(selectedCategoriesLower)
    ? selectedCategoriesLower.map(function(x){ return (x || '').toString().trim().toLowerCase(); }).filter(Boolean)
    : null;

  // Comunità selection is highlight-only, so we DO NOT filter features by affiliation.
  // (selectedAffiliationsLower is ignored and kept only for backward compatibility.)
  var selectedAff = null;

  var filtered;
  if (selected === null) {
    filtered = sitesGeojson;
  } else if (selected.length === 0) {
    filtered = { type: 'FeatureCollection', features: [] };
  } else {
    // Filter features whose categoria is in selected
    filtered = {
      type: 'FeatureCollection',
      features: (sitesGeojson.features || []).filter(function(f) {
        var p = (f.properties || {});
        var craw = (p.category && p.category.toString().trim()) ? p.category : (p.categoria || '');
        var c = craw.toString().trim().toLowerCase();
        return (selected.indexOf(c) !== -1);
      })
    };
  }

  // Optional: isolate one place entity by `sito` (story mode in the right sidebar).
  // In story mode we intentionally show *all* phases of that place, regardless of the
  // category filter, so the user can follow changes over time.
  if (selectedSiteName) {
    filtered = {
      type: 'FeatureCollection',
      features: (sitesGeojson.features || []).filter(function(f){
        return normSiteName((f.properties || {}).sito) === normSiteName(selectedSiteName);
      })
    };
  }

  var base = L.geoJSON(filtered, {
    pointToLayer: function(feature, latlng) {
      var p = (feature && feature.properties) ? feature.properties : {};
      // Story mode: keep category colour so selection from the list is immediately recognisable
      if (selectedSiteName) {
        var present = [];
        try {
          for (var si = 0; si < (window.selectedAffiliationsLower || []).length; si++) {
            var ksel = (window.selectedAffiliationsLower || [])[si];
            if (featureHasSelectedAff(p, ksel)) present.push(ksel);
          }
        } catch(e) {}
        var rings = present.length ? ringsCssForSelectedKeys(present) : '';
        return L.marker(latlng, { icon: makeStoryIconForProperties(p, 32, rings) });
      }
      // Main chronology: base style will be refined by updateOverlapStyles()
      return L.marker(latlng, { icon: makeCountIcon(1, PAL_LIGHT, 20, '') });
    },
    onEachFeature: onEachSiteFeature
  });

  // In story mode we keep ALL phases visible at once (static layer),
  // and use the time slider to highlight the active phase (see updateStoryHighlight()).
  var timed = null;
  if (selectedSiteName) {
    timed = base;
  } else {
    timed = L.TimeDimension.Layer.betweendates(
      base,
      { timeDimension: map.timeDimension }
    );
  }

  return { base: base, timed: timed };
}

      // Initial layers (all categories)
      var layers = buildLayers(null, null);
      var baseGeoJsonLayer = layers.base;
      var timeSitesLayer = layers.timed;

      // ---- Layer selector removed (no longer needed) ----
      // The project now has a single temporal layer always shown.
      // Keeping Leaflet's layer control adds UI clutter.
      var layerControl = null;

      // Default: visible
      timeSitesLayer.addTo(map);

      // ---- Ensure a sane initial time + apply dynamic styling immediately ----
      // Without this, the first render can show "inactive" styling until the first
      // user-triggered time change (e.g. Reset).
      try {
        var minYear = null;
        (sitesGeojson.features || []).forEach(function(f){
          var y = Number((f.properties||{}).start_year);
          if (!isNaN(y)) minYear = (minYear === null) ? y : Math.min(minYear, y);
        });
        if (minYear !== null && map.timeDimension) {
          map.timeDimension.setCurrentTime(Date.UTC(minYear, 0, 1));
        }
      } catch(e) {}

      // First paint (after TD builds its first _currentLayer)
      try {
        setTimeout(function(){
          try { updateOverlapStyles(); } catch(e1) {}
          try { updateSidebarList(); } catch(e2) {}
        }, 0);
      } catch(e) {}

      // ---- Autoplay on load ----
      // Start the TimeDimension player automatically when the map is ready.
      try {
        if (map && map._tdPlayer && typeof map._tdPlayer.start === 'function') {
          // Small delay ensures the control/layers are fully attached.
          setTimeout(function(){ try { map._tdPlayer.start(); } catch(e) {} }, 300);
        }
      } catch(e) {}


// ---- Shared references (for rebuilding layers when filters change) ----
var searchControl = null;

// Sidebar selection state
// When set, we enter "story mode" and isolate all records with the same `sito`
// so the map shows how that place changes across time.
var selectedSiteName = null;
    selectedFocusUid = null;
var selectedCategoryColor = null;
var sidebarOpenCategories = {};

// ---- Story mode helpers (dates + movement arrows) ----
var storyIndexByUid = {};
var storyPathLatLngs = [];
var storyMovementLayer = null;
var expandedSidebarCategoryLower = null;

// Compute ordering + path for the currently selected place.

function sentenceCaseLabel(str){
  str = String(str || '').trim();
  if (!str) return '';
  return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
}

function computeStoryMeta(phases) {
  storyIndexByUid = {};
  storyPathLatLngs = [];
  if (!Array.isArray(phases)) return;

  for (var i = 0; i < phases.length; i++) {
    var p = (phases[i] && phases[i].properties) ? phases[i].properties : ((phases[i] && phases[i].feature && phases[i].feature.properties) ? phases[i].feature.properties : {});
    var uid = (p && (p.uid !== undefined) && p.uid !== null) ? String(p.uid) : String(i);
    storyIndexByUid[uid] = i;

    try {
      var g = phases[i].geometry || (phases[i].feature ? phases[i].feature.geometry : null);
      if (g && g.coordinates && g.coordinates.length >= 2) {
        var ll = L.latLng(Number(g.coordinates[1]), Number(g.coordinates[0]));
        if (!isNaN(ll.lat) && !isNaN(ll.lng)) storyPathLatLngs.push(ll);
      }
    } catch(e) {}
  }

  // Dedupe consecutive duplicates (no movement)
  var dedup = [];
  for (var j = 0; j < storyPathLatLngs.length; j++) {
    var cur = storyPathLatLngs[j];
    var prev = (dedup.length ? dedup[dedup.length - 1] : null);
    if (!prev || (cur.lat !== prev.lat || cur.lng !== prev.lng)) dedup.push(cur);
  }
  storyPathLatLngs = dedup;
}

// Keep date labels visually anchored to their icon and move them only when needed.
function storyTooltipBaseOffset(direction, dx, dy) {
  var defaults = {
    right: L.point(2, 0),
    left: L.point(-2, 0),
    top: L.point(0, -5),

    var sx = 0, sy = 0, sn = 0;
    for (var ci = 0; ci < ordered.length; ci++) {
      if (!ordered[ci] || !ordered[ci].getLatLng) continue;
      var cpt = map.latLngToContainerPoint(ordered[ci].getLatLng());
      if (!cpt) continue;
      sx += cpt.x; sy += cpt.y; sn++;
    }
    if (sn) clusterCenter = { x: sx / sn, y: sy / sn };
  }

  var candidates = storyPopupCandidateOffsets(width, height, pt, clusterCenter);
  var best = null;
  candidates.forEach(function(candidate){
    var box = storyPopupBoxForCandidate(pt, width, height, candidate.offset);
    var viewportPenalty = storyViewportPenalty(box, mapSize, 16) * 180;
    var overlapMarkers = 0;
    var overlapLabels = 0;
    var overlapMarkerArea = 0;
    var overlapLabelArea = 0;
    for (var i = 0; i < markerObstacles.length; i++) {
      var a1 = storyBoxIntersectionArea(box, markerObstacles[i], 22, 22);
      if (a1 > 0) { overlapMarkers++; overlapMarkerArea += a1; }
    }
    for (var j = 0; j < labelObstacles.length; j++) {
      var a2 = storyBoxIntersectionArea(box, labelObstacles[j], 22, 18);
      if (a2 > 0) { overlapLabels++; overlapLabelArea += a2; }
    }
    var linePenalty = storyLabelLinePenalty(box, lineSegments);
    var dist = Math.sqrt(Math.pow(((box.x1 + box.x2) / 2) - pt.x, 2) + Math.pow(((box.y1 + box.y2) / 2) - pt.y, 2));
    var distancePenalty = Math.max(0, dist - 156) * 9;
    var ownLabelPenalty = 0;
    try {
      var tipOwn = layer.getTooltip ? layer.getTooltip() : null;
      var telOwn = tipOwn && tipOwn.getElement ? tipOwn.getElement() : null;
      if (telOwn && telOwn.offsetWidth && telOwn.offsetHeight) {
        var ownBox = storyTooltipBoxForCandidate(pt, telOwn.offsetWidth, telOwn.offsetHeight, tipOwn.options.direction || 'right', tipOwn.options.offset || L.point(0,0));
        var ownArea = storyBoxIntersectionArea(box, ownBox, 26, 24);
        if (ownArea > 0) ownLabelPenalty = 56000 + ownArea * 4;
      }
    } catch(eOwn) {}
    var markerPenalty = overlapMarkers * 24000 + overlapMarkerArea * 6;
    var labelPenalty = overlapLabels * 30000 + overlapLabelArea * 7;
    candidate.totalPenalty = viewportPenalty + markerPenalty + labelPenalty + linePenalty * 12000 + ownLabelPenalty + distancePenalty + candidate.score;
    candidate.box = box;
    if (!best || candidate.totalPenalty < best.totalPenalty) best = candidate;
  });

  if (!best) return;
  try {
    popup.options.offset = best.offset;
    popup.update();
    setTimeout(function(){
      try {
        var el = popup.getElement ? popup.getElement() : null;
        if (el) {
          el.classList.remove('popup-dir-right','popup-dir-left','popup-dir-top','popup-dir-bottom');
          el.classList.add('popup-dir-' + best.direction);
        }
      } catch(eDir) {}
      try { updatePopupConnector(layer); } catch(e6) {}
    }, 0);
  } catch(e5) {}
}

// Angle (deg) from A to B measured in screen space.
// Using projected points keeps arrows aligned with the rendered segment,
// even when map projection makes geographic bearings look slightly off.
function screenAngleDeg(a, b) {
  if (!a || !b || !map || !map.latLngToLayerPoint) return 0;
  var pa = map.latLngToLayerPoint(a);
  var pb = map.latLngToLayerPoint(b);
  var dx = (pb.x - pa.x);
  var dy = (pb.y - pa.y);
  return Math.atan2(dy, dx) * 180 / Math.PI;
}

function interpolateLatLng(a, b, t) {
  return L.latLng(
    a.lat + (b.lat - a.lat) * t,
    a.lng + (b.lng - a.lng) * t
  );
}

function renderStoryMovement() {

  // Animated dashed line to suggest movement
  var line = L.polyline(storyPathLatLngs, {

    weight: 2,
    opacity: 0.55,
    dashArray: '6 10',
    lineCap: 'round',
    className: 'movement-line'
  });
  storyMovementLayer.addLayer(line);

  // Three direction arrows per segment, spaced away from the endpoints.
  var arrowFractions = [0.24, 0.50, 0.76];
  var arrowSvg = '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">'
    + '<path d="M4 12h10" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"></path>'
    + '<path d="M12 6.8L20 12l-8 5.2z" fill="currentColor"></path>'
    + '</svg>';

  for (var i = 0; i < storyPathLatLngs.length - 1; i++) {
    var a = storyPathLatLngs[i], b = storyPathLatLngs[i+1];
    var ang = screenAngleDeg(a, b);

    for (var j = 0; j < arrowFractions.length; j++) {
      var ll = interpolateLatLng(a, b, arrowFractions[j]);
      var icon = L.divIcon({
        className: 'movement-arrow-icon',

}

function getSidebarSearchCandidates() {
  var term = String(placeSearchTermLower || '').trim().toLowerCase();
  if (!term) return [];

  var seen = {};
  var out = [];

  (sitesGeojson.features || []).forEach(function(f){
    var p = (f && f.properties) ? f.properties : {};
    var nm = String(p.sito || '').trim();
    if (!nm) return;
    if (!passesActiveFilters(p)) return;
    if (nm.toLowerCase().indexOf(term) === -1) return;

    var key = normSiteName(nm);
    if (!key || seen[key]) return;
    seen[key] = true;
    out.push({
      key: key,
      name: nm,
      uid: String(p.uid || ''),
      feature: f,
      exact: (nm.toLowerCase() === term)
    });
  });

  out.sort(function(a,b){
    if (a.exact !== b.exact) return a.exact ? -1 : 1;
    return a.name.localeCompare(b.name, 'it');
  });
  return out;
}

function autoActivateSidebarSearch(forceFirst) {
  var term = String(placeSearchTermLower || '').trim().toLowerCase();
  if (!term) {
    lastAutoSearchSelectionKey = '';
    return;
  }

  var candidates = getSidebarSearchCandidates();
  if (!candidates.length) return;

  var target = null;
  for (var i = 0; i < candidates.length; i++) {
    if (candidates[i].exact) { target = candidates[i]; break; }
  }
  if (!target && candidates.length === 1) target = candidates[0];
  if (!target && forceFirst) target = candidates[0];
  if (!target) return;

  var selectionKey = term + '::' + normSiteName(target.name) + '::' + String(target.uid || '');
  if (selectionKey === lastAutoSearchSelectionKey) return;
  lastAutoSearchSelectionKey = selectionKey;

  try {
    selectedCategoryColor = catColorFor((target.feature && target.feature.properties) ? target.feature.properties : {});
  } catch(e) { selectedCategoryColor = null; }
  selectPlaceByName(target.name, target.uid);
}

    }

function getCurrentYear() {
  var t = map && map.timeDimension ? map.timeDimension.getCurrentTime() : NaN;
  if (isNaN(t)) return null;
  return new Date(t).getFullYear();
}

function yearLabelForFeature(p) {
  if (!p) return '';
  var sy = cleanYearValue(p.start_year);
  var ey = cleanYearValue(p.end_year);
  if (!ey) return sy ? (sy + '–') : '';
  return (sy === ey) ? sy : (sy + '–' + ey);
}

function isFeatureActiveAtTime(f, t) {
  var p = (f && f.properties) ? f.properties : {};
  var t0 = p._t0;
  var t1 = p._t1;
  if (!isNaN(t0) && !isNaN(t1)) return (t >= t0 && t <= t1);

  var y = new Date(t).getFullYear();
  var ys = numericYearValue(p.start_year);
  var ye = numericYearValue(p.end_year);
  if (ys === null) return false;
  if (ye === null) return (y >= ys);
  return (y >= ys && y <= ye);
}

function categoryIsActive(p) {
  if (!p) return false;
  if (!Array.isArray(activeCategoriesLower)) return true;
  var craw = (p.category && p.category.toString().trim()) ? p.category : (p.categoria || '');
  var c = craw.toString().trim().toLowerCase();
  return activeCategoriesLower.indexOf(c) !== -1;
}


function affiliationIsActive(p) {
  if (!p) return false;
  if (!Array.isArray(activeAffiliationsLower)) return true;
  var araw = (p.affiliazione || '').toString().trim();
  var key = canonicalAffiliationKey(araw || AFF_NONE_KEY);
  return activeAffiliationsLower.indexOf(key) !== -1;
}

function passesActiveFilters(p) {
  // Comunità selection must NOT filter the dataset; it is used only for outline highlighting.
  return categoryIsActive(p);
}

function catColorFor(p) {
  return '#f17e5a';
}

function affKeysFor(p) {
  var raw = (p && p.affiliazione != null) ? String(p.affiliazione) : '';
  raw = raw.trim();
  if (!raw) return [AFF_NONE_KEY];
  // Allow multiple affiliations in one cell (e.g., "Persiani; Libanesi")
  var parts = raw.split(/[;,\/|\n]+/).map(function(s){ return String(s).trim(); }).filter(function(s){ return !!s; });
  if (!parts.length) return [AFF_NONE_KEY];
  return parts.map(function(s){ return canonicalAffiliationKey(s); });
}

function affKeyFor(p) {
  return affKeysFor(p)[0];
}
function affColorForKey(k) {
  if (!k) return '#555';
  var kk = String(k).trim().toLowerCase();
  return (AFF_OUTLINE_COLORS && AFF_OUTLINE_COLORS[kk]) ? AFF_OUTLINE_COLORS[kk] : '#555';
}

function affColorFor(p) {
  return affColorForKey(affKeyFor(p));
}


function hexToRgb(hex) {
  if (!hex) return null;
  var h = String(hex).replace('#','').trim();
  if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  if (h.length !== 6) return null;
  var n = parseInt(h, 16);
  if (isNaN(n)) return null;
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}

function rgbToHex(r,g,b){
  function toHex(x){ var s = Math.max(0, Math.min(255, Math.round(x))).toString(16); return (s.length===1?'0':'')+s; }
  return '#' + toHex(r) + toHex(g) + toHex(b);
}

// Darken a colour by factor in [0..1]
function darken(hex, factor) {
  var rgb = hexToRgb(hex);
  if (!rgb) return hex || '#999';
  var f = Math.max(0, Math.min(1, factor || 0));
  return rgbToHex(rgb.r * (1 - f), rgb.g * (1 - f), rgb.b * (1 - f));
}


// --- Global palette for main chronology (single Greens palette) ---
// Lighter end of the Greens palette: keep it visibly green (not "almost white")
// Use a clearly visible light green (the previous one looked "transparent" on light basemaps)
var PAL_LIGHT = '#74c476';
var PAL_DARK  = '#006d2c';

function lerp(a,b,t){ return a + (b-a)*t; }
function mixHex(hexA, hexB, t) {
  var A = hexToRgb(hexA), B = hexToRgb(hexB);
  if (!A || !B) return hexA || '#999';
  var tt = Math.max(0, Math.min(1, t));
  return rgbToHex(lerp(A.r,B.r,tt), lerp(A.g,B.g,tt), lerp(A.b,B.b,tt));
}


// Build one or more outline "rings" (marker borders) using CSS box-shadow.
// We keep the marker body untouched; rings are only shown when one or more Comunità are selected.
function ringsCssForColors(colors) {
  if (!colors || !colors.length) return '0 0 0 0 transparent';
  var base = 3; // ring thickness
  var gap  = 1; // spacing between rings
  var out = [];
  for (var i = 0; i < colors.length; i++) {
    var w = base * (i + 1) + gap * i; // 3,7,11,...
    out.push('0 0 0 ' + w + 'px ' + colors[i]);
  }
  return out.join(', ');
}

function ringsCssForSelectedKeys(presentKeysLower) {
  if (!presentKeysLower || !presentKeysLower.length) return '0 0 0 0 transparent';
  var cols = presentKeysLower.map(function(k){ return affColorForKey(k); });
  return ringsCssForColors(cols);
}

function featureHasSelectedAff(p, keyLower) {
  var keys = affKeysFor(p || {});
  return keys.indexOf(keyLower) !== -1;
}

function makeCountIcon(count, color, size, rings) {
  var sz = Math.max(12, Number(size) || 18);
  var fs = Math.max(10, Math.round(sz * 0.55));
  var cInt = Math.max(1, Math.min(6, Number(count) || 1));
  var palette = {1:'#f17e5a',2:'#e55433',3:'#d83419',4:'#bc1600',5:'#9e0f00',6:'#720800'};
  var col = palette[cInt] || '#f17e5a';
  var ringsCss = (rings !== undefined && rings !== null && String(rings).trim() !== '') ? String(rings) : '0 0 0 0 transparent';
  return L.divIcon({
    className: 'count-marker-wrap count-' + cInt,
    html: '<div class="count-marker count-' + cInt + '" style="--cm:' + col + ';--rings:' + ringsCss + ';--sz:' + sz + 'px;--fs:' + fs + 'px">' + (count||1) + '</div>',
    iconSize: [sz, sz],
    iconAnchor: [sz/2, sz/2]
  });
}

// --- Spiderfy (cluster-like expansion) for stacked markers ---
var spiderfyLayer = null;
var spiderfyOriginKey = null;

function ensureSpiderfyLayer() {
  if (!spiderfyLayer) {
    spiderfyLayer = L.layerGroup().addTo(map);
    // Close spiderfy when user clicks elsewhere
    try {
      map.on('click', function(){ clearSpiderfy(); });
      map.on('zoomstart', function(){ clearSpiderfy(); });
      map.on('movestart', function(){ clearSpiderfy(); });
      map.timeDimension && map.timeDimension.on('timeload', function(){ clearSpiderfy(); });
    } catch(e) {}
  }
}

function clearSpiderfy() {
  if (!spiderfyLayer) return;
  try { spiderfyLayer.clearLayers(); } catch(e) {}
  spiderfyOriginKey = null;
}

// Icon-only marker for category glyphs (no coloured blob).
// The glyph itself is slightly tinted; outlines are thicker for readability.
function makeIconOnlyMarker(svgHtml, accentColor, sizePx, rings) {
  var sz = Math.max(16, Number(sizePx) || 22);
  var ringsCss = (rings !== undefined && rings !== null && String(rings).trim() !== '') ? String(rings) : '0 0 0 0 transparent';
  var accent = accentColor || '#111';
  return L.divIcon({
    className: 'icon-only-marker-wrap',
    html:
      '<div class="icon-only-marker" style="--sz:' + sz + 'px;--rings:' + ringsCss + ';--accent:' + accent + '">' +
        '<span class="icon-only-marker__icon" style="color:' + accent + '">' + (svgHtml || '') + '</span>' +
      '</div>',
    iconSize: [sz, sz],
    iconAnchor: [sz/2, sz/2]
  });
}

function makeCategoryIcon(categoryLabel, accentColor, sizePx, rings) {
  return makeIconOnlyMarker(catIcon(categoryLabel), accentColor, sizePx, rings);
}

function makeStoryIconForProperties(p, sizePx, rings) {
  var accent = catColorFor(p || {});
  return makeIconOnlyMarker(catIcon(p.categoria || p.category || ''), accent, sizePx, rings);
}

function selectPlaceFromFeature(feature) {
  if (!feature || !feature.properties) return;
  var p = feature.properties || {};
  try { selectedCategoryColor = catColorFor(p); } catch(e) { selectedCategoryColor = null; }
  selectPlaceByName(p.sito, String(p.uid || ''));
}

function spiderfyStack(originLatLng, key, features) {
  ensureSpiderfyLayer();
  if (!features || features.length <= 1) return;

  // Toggle behaviour: clicking the same stack closes it.
  if (spiderfyOriginKey && spiderfyOriginKey === key) {
    clearSpiderfy();
    return;
  }
  clearSpiderfy();
  spiderfyOriginKey = key;

  var n = features.length;
  var centerPt = map.latLngToLayerPoint(originLatLng);
  var radiusPx = Math.max(18, Math.min(45, 14 + 6 * Math.sqrt(n)));

  for (var i = 0; i < n; i++) {
    var ang = (Math.PI * 2 * i) / n;
    var pt = L.point(centerPt.x + radiusPx * Math.cos(ang), centerPt.y + radiusPx * Math.sin(ang));
    var ll = map.layerPointToLatLng(pt);

    var p = (features[i].properties || {});
    var catKey = (p.categoria || '').toString().trim().toLowerCase();
    var catCol = (CATEGORY_COLORS && CATEGORY_COLORS[catKey]) ? CATEGORY_COLORS[catKey] : '#666';

    // Comunità outlines are opt-in: only when one or more communities are selected.
    var present = [];
    try {
      for (var si = 0; si < selectedAffiliationsLower.length; si++) {
        var ksel = selectedAffiliationsLower[si];
        if (featureHasSelectedAff(p, ksel)) present.push(ksel);
      }
    } catch(e) {}
    var rings = present.length ? ringsCssForSelectedKeys(present) : '';
    var m = L.marker(ll, { icon: makeCategoryIcon((p.categoria || p.category || catKey || ''), catCol, 24, rings), riseOnHover: true });
    try { bindPopupHtml(features[i], m); } catch(e) {}

    // Clicking one of the spiderfied points: open its popup.
    // IMPORTANT: stop propagation so the map click handler doesn't immediately clear spiderfy.
    m.on('click', (function(feature){
      return function(e){
        try {
          if (e && e.originalEvent) {
            L.DomEvent.stopPropagation(e.originalEvent);
            L.DomEvent.preventDefault(e.originalEvent);
          }
          L.DomEvent.stop(e);
        } catch(err) {}
        try { this.openPopup(); } catch(err2) {}
        try { selectPlaceFromFeature(feature); } catch(err3) {}
      };
    })(features[i]));

    spiderfyLayer.addLayer(m);
  }
}

// In the general view (main chronology), dynamically emphasise stacks of points that share
// the same coordinates at the current time:
//   - SAME hue for all points
//   - more points => darker + larger
function updateOverlapStyles() {
  if (!map || !map.timeDimension) return;
  if (selectedSiteName) return; // story mode: keep fixed styling

  var t = map.timeDimension.getCurrentTime();
  var counts = {};
  var groups = {};

  function keyForLatLng(ll) {
    return ll.lat.toFixed(6) + ',' + ll.lng.toFixed(6);
  }

  // Prefer the actually displayed geojson layer (TimeDimension's current layer)
  // so styling always matches what the user sees.
  var displayed = (timeSitesLayer && timeSitesLayer._currentLayer) ? timeSitesLayer._currentLayer : baseGeoJsonLayer;
  if (!displayed) return;

  // Pass 1: count active points per coordinate (and keep the layers grouped)
  displayed.eachLayer(function(l){
    if (!l || !l.feature || !l.feature.properties || !l.getLatLng) return;
    var f = l.feature;
    var p = f.properties || {};
    if (!passesActiveFilters(p)) return;
    if (!isFeatureActiveAtTime(f, t)) return;

    var k = keyForLatLng(l.getLatLng());
    counts[k] = (counts[k] || 0) + 1;
    if (!groups[k]) groups[k] = [];
    groups[k].push(l);
  });

  // Determine scaling range
  var maxCount = 1;
  Object.keys(counts).forEach(function(k){ maxCount = Math.max(maxCount, counts[k] || 1); });
  // Color palette (single Greens) defined globally: PAL_LIGHT -> PAL_DARK

  // Pass 2: apply styles
  // NOTE: points are Leaflet Markers (DivIcons) so we style with setIcon/setOpacity.
  // We also make them behave like a cluster: for a stack, show ONE aggregate marker
  // and hide the duplicates; clicking the aggregate "spiderfies" the stack.
  displayed.eachLayer(function(l){
    if (!l || !l.feature || !l.feature.properties || !l.getLatLng) return;
    var f = l.feature;
    var p = f.properties || {};
    var activeNow = passesActiveFilters(p) && isFeatureActiveAtTime(f, t);
    if (!activeNow) {
      try { l.setOpacity(0); } catch(e) {}
      return;
    }

    var k = keyForLatLng(l.getLatLng());
    var c = counts[k] || 1;

    // Determine if this layer is the "leader" of its coordinate group
    var group = groups[k] || [l];
    var leader = group[0] === l;

    if (!leader) {
      // Hide duplicates so we get a true single marker per coordinate
      try { l.setOpacity(0); } catch(e) {}
      try { if (l._icon) l._icon.style.pointerEvents = 'none'; } catch(e2) {}
      return;
    }

    // Normalised intensity for colour (single Greens palette)
    var tt = (maxCount <= 1) ? 0 : ((c - 1) / (maxCount - 1));
    var col = mixHex(PAL_LIGHT, PAL_DARK, tt);

    // Size scaling (visible)
    var radius = 7 + 5 * Math.sqrt(Math.max(0, c - 1));
    try {
      // When count==1 we still want it clearly visible (verdino)
      if (typeof l.setOpacity === "function") l.setOpacity(1);
      if (l._icon) l._icon.style.pointerEvents = 'auto';
      if (typeof l.setIcon === "function") {
        // Comunità highlight: ONLY add a coloured outline to markers that include
        // at least one feature of the selected affiliation at the current time/coordinate.
        var present = [];
        try {
          for (var si = 0; si < (window.selectedAffiliationsLower || []).length; si++) {
            var ksel = (window.selectedAffiliationsLower || [])[si];
            var hasAff = false;
            for (var gi = 0; gi < group.length; gi++) {
              var fp = (group[gi] && group[gi].feature) ? (group[gi].feature.properties || {}) : {};
              if (featureHasSelectedAff(fp, ksel)) { hasAff = true; break; }
            }
            if (hasAff) present.push(ksel);
          }
        } catch(eAff) {}
        var rings = present.length ? ringsCssForSelectedKeys(present) : '';
        l.setIcon(makeCountIcon(c, col, radius*2.2, rings));
      }
    } catch(e) {}


    // If this marker represents a stack (>1), disable its own popup so click can spiderfy.
    // When it becomes a single point again, restore the popup.
    try {
      if (c > 1) {
        if (typeof l.getPopup === 'function' && l.getPopup()) l.unbindPopup();
      } else {
        if (typeof l.getPopup === 'function' && !l.getPopup()) bindPopupHtml(l.feature, l);
      }
    } catch(ePop) {}
    // Store stack info on the leader marker so the click handler always has fresh data
    try {
      l._stackKey = k;
      l._stackCount = c;
      l._stackFeatures = group.map(function(x){ return x.feature; }).filter(Boolean);
    } catch(e) {}

    // Bind click: if stacked, spiderfy; if single, keep the usual behaviour.
    if (!l._stackClickBound) {
      l._stackClickBound = true;
      l.on('click', function(e){
        try { if (e) L.DomEvent.stop(e); } catch(err) {}
        var ll = this.getLatLng ? this.getLatLng() : null;
        if (!ll) return;
        var kk = this._stackKey || keyForLatLng(ll);
        var feats = this._stackFeatures || [];
        var cc = this._stackCount || feats.length || 1;
        if (cc > 1 && feats.length) {
          // Spiderfy to individual category-coloured markers with popups
          spiderfyStack(ll, kk, feats);
        } else {
          clearSpiderfy();
          // Open popup + enter story mode
          try { this.openPopup && this.openPopup(); } catch(err2) {}
          try { this.feature && selectPlaceFromFeature(this.feature); } catch(err3) {}
        }
      });
    }
  });
}

var _lastSidebarTapTs = 0;
function bindSidebarTap(el, handler) {
  if (!el || !handler) return;
  el.addEventListener('pointerup', function(ev){
    if (ev && ev.pointerType === 'mouse') return;
    _lastSidebarTapTs = Date.now();
    ev.preventDefault();
    ev.stopPropagation();
    handler(ev);
  });
  el.addEventListener('click', function(ev){
    if (Date.now() - _lastSidebarTapTs < 450) {

function updateSidebarList() {

      dot.style.color = activeNow ? catColorFor(p) : '#9e9e9e';

      cat.textContent = (function(v){ v=String(v||''); if (v.toLowerCase()==='schools') return 'Education'; if (v.toLowerCase()==='scuole') return 'Educazione'; return v; })(p.categoria || p.category || '');

      function activatePhase(){

        var t0 = Date.parse(String(p.start_date || '').trim());
        if (!isNaN(t0)) map.timeDimension.setCurrentTime(t0);

        try {
          var targetLayer = null;
          baseGeoJsonLayer.eachLayer(function(l){
            if (l && l.feature && l.feature.properties && String(l.feature.properties.uid) === String(p.uid)) targetLayer = l;
          });
          if (targetLayer) {
            focusLatLngKeepingSidebar(targetLayer.getLatLng(), 15);
            // If the time doesn't actually change, Leaflet.TimeDimension may not emit a new 'timeload'.
            // So we register a one-shot handler *and* an immediate fallback.
            var __open = function(){ try { targetLayer.openPopup(); } catch(e) {} };
            try { map.timeDimension && map.timeDimension.once('timeload', __open); } catch(e) {}
            setTimeout(__open, 60);
          }
        } catch(e) {}
      }

      item.addEventListener('click', activatePhase);
      item.addEventListener('keydown', function(ev){
        if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); activatePhase(); }
      });

      placesListEl.appendChild(item);
    });

    if (btnClearSelection) { btnClearSelection.disabled = false; btnClearSelection.removeAttribute("disabled"); }
    return;
  }

  // NORMAL MODE: list ALL places in the dataset, grouped by category.
  // (No time filtering here: the list is the complete index; the map is filtered by the timeline.)
  var byCategory = {};
  (sitesGeojson.features || []).forEach(function(f){
    var p = f.properties || {};
    var nm = String(p.sito || '').trim();
    if (!nm) return;

    // Apply Categoria dropdown filter (and keep story mode behaviour elsewhere)
    if (!passesActiveFilters(p)) return;

    // Apply sidebar search (free text)
    if (placeSearchTermLower && nm.toLowerCase().indexOf(placeSearchTermLower) === -1) return;

    var craw = (p.categoria || p.category || '').toString().trim();
    var catLabel = craw || 'Altro / non classificato';

    if (!byCategory[catLabel]) byCategory[catLabel] = {};
    if (!byCategory[catLabel][nm]) byCategory[catLabel][nm] = [];
    byCategory[catLabel][nm].push(f);
  });

  var catNames = Object.keys(byCategory);
  catNames.sort(function(a,b){ return a.localeCompare(b, 'it'); });

  // Count total unique places
  var totalPlaces = 0;
  catNames.forEach(function(cn){ totalPlaces += Object.keys(byCategory[cn] || {}).length; });

  var _isFiltered = (placeSearchTermLower && placeSearchTermLower.length);
  if (sidebarCountEl) sidebarCountEl.textContent = totalPlaces + (_isFiltered ? ' luoghi filtrati' : ' luoghi');
  placesListEl.innerHTML = '';


  var anyOpen = false;
  catNames.forEach(function(catLabel){
    var section = document.createElement('div');
    section.className = 'place-section';

    var names = Object.keys(byCategory[catLabel] || {});
    names.sort(function(a,b){ return a.localeCompare(b, 'it'); });
    var catKey = String(catLabel || '').toLowerCase();
    if (typeof sidebarOpenCategories[catKey] === 'undefined') sidebarOpenCategories[catKey] = false;
    if (sidebarOpenCategories[catKey]) anyOpen = true;

    var head = document.createElement('button');
    head.type = 'button';
    head.className = 'place-section-toggle' + (sidebarOpenCategories[catKey] ? ' is-open' : '');
    head.setAttribute('aria-expanded', sidebarOpenCategories[catKey] ? 'true' : 'false');

    var main = document.createElement('span');
    main.className = 'place-section-head-main';

    var dot = document.createElement('span');
    dot.className = 'place-ico place-ico--section';
    dot.innerHTML = catIcon(String(catLabel || ''));
    dot.style.color = catColorFor({ categoria: catLabel });

    var title = document.createElement('span');
    title.className = 'place-section-label';
    title.textContent = sentenceCaseLabel(catLabel);

    var count = document.createElement('span');
    count.className = 'place-section-count';
    count.textContent = String(names.length);

    var chev = document.createElement('span');
    chev.className = 'place-section-chevron';
    chev.textContent = sidebarOpenCategories[catKey] ? '−' : '+';

    main.appendChild(dot);
    main.appendChild(title);
    head.appendChild(main);
    head.appendChild(count);
    head.appendChild(chev);
    section.appendChild(head);

    var itemsWrap = document.createElement('div');
    itemsWrap.className = 'place-section-items';
    itemsWrap.hidden = !sidebarOpenCategories[catKey];

    names.forEach(function(nm){
      var group = byCategory[catLabel][nm] || [];
      group.sort(function(a,b){ return Number((a.properties||{}).start_year) - Number((b.properties||{}).start_year); });
      var rep = group[0];
      var p = rep.properties || {};

      var item = document.createElement('button');
      item.type = 'button';
      item.className = 'place-item';

      var name = document.createElement('div');
      name.className = 'place-name';
      name.textContent = nm;

      var meta = document.createElement('div');
      meta.className = 'place-meta';

      var left = document.createElement('div');
      left.className = 'place-cat';

      var d2 = document.createElement('span');
      d2.className = 'place-ico';
      d2.innerHTML = catIcon((function(v){ v=String(v||''); if (v.toLowerCase()==='education' || v.toLowerCase()==='educazione') return 'school'; return v; })(p.categoria || p.category || ''));
      d2.style.color = catColorFor(p);

      var phases = document.createElement('span');
      phases.textContent = (group.length > 1) ? (group.length + ' indirizzi') : yearLabelForFeature(p);

      left.appendChild(d2);
      left.appendChild(phases);
      meta.appendChild(left);

      item.appendChild(name);
      item.appendChild(meta);

      function activate(){ selectedCategoryColor = catColorFor(p); selectPlaceByName(nm, String((p && p.uid) ? p.uid : '')); }
      bindSidebarTap(item, activate);
      item.addEventListener('keydown', function(ev){
        if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); activate(); }
      });

      itemsWrap.appendChild(item);
    });

    bindSidebarTap(head, function(ev){
      if (ev) { ev.preventDefault(); ev.stopPropagation(); }
      sidebarOpenCategories[catKey] = !sidebarOpenCategories[catKey];
      updateSidebarList();
    });

    section.appendChild(itemsWrap);
    placesListEl.appendChild(section);
  });

  var intro = document.createElement('div');
  intro.className = 'sidebar-project-intro';
  intro.hidden = anyOpen;
  intro.innerHTML = '<h4>Come usare questa mappa</h4><p>' + projectIntroText + '</p>';
  placesListEl.appendChild(intro);

  if (btnClearSelection) { btnClearSelection.disabled = false; btnClearSelection.removeAttribute("disabled"); }
}

function selectPlaceByName(name, focusUid) {
  if (!name) return;

  selectedSiteName = normSiteName(name);
  selectedSiteLabel = String(name || '').trim();
  selectedFocusUid = (typeof focusUid !== 'undefined' && focusUid !== null) ? String(focusUid) : null;

  // Ensure temporal layer is visible
  if (!map.hasLayer(timeSitesLayer)) timeSitesLayer.addTo(map);

  // Stop autoplay so the selection feels stable
  try { if (map._tdPlayer && map._tdPlayer.isPlaying && map._tdPlayer.isPlaying()) map._tdPlayer.stop(); } catch(err) {}

  // Jump the slider to the first phase (earliest start) so the story is visible immediately
  var phases = (sitesGeojson.features || []).filter(function(ff){
    return normSiteName((ff.properties||{}).sito) === normSiteName(selectedSiteName);
  });
  phases.sort(function(a,b){ return Number((a.properties||{}).start_year) - Number((b.properties||{}).start_year); });
  try { computeStoryMeta(phases); } catch(e) {}
  if (phases.length && phases[0].properties) {
    var t0 = Date.parse(String(phases[0].properties.start_date || '').trim());
    if (!isNaN(t0)) map.timeDimension.setCurrentTime(t0);
  }

  // Rebuild the layer stack so the map shows ONLY this place (all its phases) across time
  rebuildOverlaysAndSearch();

  // Fit to all phases and open the focused popup (or the first one)
  try {
    var bounds = [];
    var firstLayer = null;
    var focusLayer = null;

    baseGeoJsonLayer.eachLayer(function(l){
      if (l && l.getLatLng) {
        bounds.push(l.getLatLng());
        if (!firstLayer) firstLayer = l;

        try {
          if (selectedFocusUid && l.feature && l.feature.properties && String(l.feature.properties.uid) === String(selectedFocusUid)) {
            focusLayer = l;
          }
        } catch(e) {}
      }
    });

    if (bounds.length) {
      fitBoundsKeepingSidebar(L.latLngBounds(bounds).pad(0.25), { maxZoom: 15 });
    } else if (firstLayer) {
      focusLatLngKeepingSidebar(firstLayer.getLatLng(), 15);
    }

    var toOpen = focusLayer || firstLayer;
    if (toOpen) {
      // Same issue as above: if current time doesn't change, 'timeload' may not fire.
      // So we attempt both: a one-shot 'timeload' and a short fallback timeout.
      var __open2 = function(){ try { toOpen.openPopup(); } catch(e) {} };
      try { map.timeDimension && map.timeDimension.once('timeload', __open2); } catch(e) {}
      setTimeout(__open2, 80);
    }
  } catch(e) {}

  // Update the sidebar info box for this place
  try { renderPlaceInfoForSelected(); } catch(e) {}

  updateSidebarList();
  setTimeout(function(){ try { if (selectedSiteName) layoutStoryPhaseLabels(); } catch(e) {} }, 80);
}

function safeText(x){
  return (x === null || typeof x === 'undefined') ? '' : String(x);
}

function renderPlaceInfoForSelected() {
  if (!placeInfoEl) return;
  if (!selectedSiteName) {
    placeInfoEl.hidden = true;
    placeInfoEl.innerHTML = '';
    return;
  }

  var phases = (sitesGeojson.features || []).filter(function(f){
    return normSiteName((f.properties||{}).sito) === normSiteName(selectedSiteName);
  });
  phases.sort(function(a,b){ return Number((a.properties||{}).start_year) - Number((b.properties||{}).start_year); });
  var rep = phases[0] ? (phases[0].properties || {}) : {};

  var cat = safeText(rep.categoria || rep.category);
  var aff = safeText(rep.affiliazione);
  var desc = safeText(rep.popup_text);
  var indir = safeText(rep.indirizzo);
  var srcInfo = safeText(getPopupSourceInfo(rep));

  var minY = null, maxY = null;
  var hasOpenEndedPhase = false;
  phases.forEach(function(f){
    var p = f.properties || {};
    var ys = numericYearValue(p.start_year);
    var ye = numericYearValue(p.end_year);
    if (ys !== null) minY = (minY === null) ? ys : Math.min(minY, ys);
    if (ye !== null) maxY = (maxY === null) ? ye : Math.max(maxY, ye);
    else hasOpenEndedPhase = true;
  });
  var years = (minY !== null && maxY !== null)
    ? (hasOpenEndedPhase ? (minY + '–') : ((minY === maxY) ? String(minY) : (minY + '–' + maxY)))
    : (minY !== null && hasOpenEndedPhase ? (minY + '–') : '');

  var html = ''
    + '<div class="place-info-title">' + safeText((rep && rep.sito) || selectedSiteLabel || selectedSiteName) + '</div>'
    + '<div class="place-info-meta">'
    +   (cat ? ('<span class="pill"><span class="pill-ico" style="color:' + catColorFor({categoria:cat}) + '">' + catIcon(cat) + '</span>' + cat + '</span>') : '')
    +   (years ? ('<span class="pill">' + years + '</span>') : '')
    +   (phases.length ? ('<span class="pill">' + phases.length + ' ' + (phases.length === 1 ? 'indirizzo' : 'indirizzi') + '</span>') : '')
    + '</div>'
    + (indir ? ('<div class="place-info-line"><strong>Indirizzo:</strong> ' + indir + '</div>') : '')
    + (aff ? ('<div class="place-info-line"><strong>Ente fondato da:</strong> ' + aff + '</div>') : '')
    + (desc ? ('<div class="place-info-desc">' + desc + '</div>') : '')
    + (srcInfo ? ('<div class="place-info-source">Fonte: ' + safeText(srcInfo) + '</div>') : '');

  placeInfoEl.innerHTML = html;
  placeInfoEl.hidden = false;
}

function handleSidebarReset(ev) {
  if (ev) { try { ev.preventDefault(); ev.stopPropagation(); } catch(e) {} }
  // Hard reset: mode / time / layer state can drift after several interactions.
  // Use a hard reload, bypassing any stale hash / transient UI state.
  try {
    var url = window.location.pathname + window.location.search;
    window.location.replace(url);
    return;
  } catch(e) {}
  try { window.location.reload(); return; } catch(e2) {}

  selectedSiteName = null;
  selectedSiteLabel = null;
  selectedFocusUid = null;
  lastAutoSearchSelectionKey = '';
  placeSearchTermLower = '';
  sidebarOpenCategories = {};
  try { if (placeSearchInputEl) placeSearchInputEl.value = ''; } catch(e3) {}
  try { if (placeInfoEl) { placeInfoEl.hidden = true; placeInfoEl.innerHTML = ''; } } catch(e4) {}
  try { clearSpiderfy(); } catch(e5) {}
  try { clearStoryMovementLayer(); } catch(e6) {}
  try { clearPopupConnector(); } catch(e7) {}
  try { rebuildOverlaysAndSearch(); } catch(e8) {}
  try { updateSidebarList(); } catch(e9) {}
}
if (btnClearSelection) {
  try {
    btnClearSelection.disabled = false;
    btnClearSelection.removeAttribute('disabled');
    btnClearSelection.setAttribute('aria-disabled', 'false');
  } catch(e) {}
  btnClearSelection.addEventListener('click', handleSidebarReset, true);
  btnClearSelection.addEventListener('pointerup', function(ev){
    if (ev && ev.pointerType === 'mouse') return;
    handleSidebarReset(ev);
  }, true);
  btnClearSelection.addEventListener('touchend', handleSidebarReset, {passive:false, capture:true});
  btnClearSelection.addEventListener('keydown', function(ev){
    if (ev.key === 'Enter' || ev.key === ' ') { handleSidebarReset(ev); }
  });
}

// Keep the sidebar in sync with the time slider / autoplay
map.timeDimension.on('timeload', function(){
  updateSidebarList();
  try { if (selectedSiteName) { updateStoryHighlight(); layoutStoryPhaseLabels(); } } catch(e) {}
  updateOverlapStyles();
});

map.on('zoomend moveend resize', function(){
  try { if (selectedSiteName) layoutStoryPhaseLabels(); } catch(e) {}
});

// When a place is found via search, move there AND open its popup automatically.
// We also jump the time slider inside the feature's time window so the feature is visible.
function bindSearchAutoPopup() {
  if (!searchControl) return;

  // Remove previous listener (defensive)
  map.off('search:locationfound');

  map.on('search:locationfound', function(e) {
    var lyr = e.layer;
    if (!lyr || !lyr.feature || !lyr.feature.properties) return;

    // Ensure the temporal layer is visible (user may have hidden it via layer selector)
    if (!map.hasLayer(timeSitesLayer)) timeSitesLayer.addTo(map);

    // Pause autoplay so the popup does not disappear on the next tick
    try { if (map._tdPlayer && map._tdPlayer.isPlaying && map._tdPlayer.isPlaying()) map._tdPlayer.stop(); } catch(err) {}
    try { if (map._tdControl && map._tdControl._player && map._tdControl._player.isPlaying && map._tdControl._player.isPlaying()) map._tdControl._player.stop(); } catch(err) {}
    var t = Date.parse(String(lyr.feature.properties.start_date || '').trim());

    function openNow(){ try{ lyr.openPopup(); }catch(e){} }

    if (!isNaN(t)) {
      map.timeDimension.once('timeload', openNow);
      map.timeDimension.setCurrentTime(t);
    } else {
      openNow();
    }
  });
}
